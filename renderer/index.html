<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>End of Quarter Countdown</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div id="fyBadge">FY26</div>
    <div id="headerTitle">End of Quarter Countdown</div>
    <button class="hdr-btn" id="syncBtn">↺ Sync</button>
    <button class="hdr-btn" id="editBtn">✎ Edit</button>
  </div>

  <!-- Countdown -->
  <div id="countdown">
    <div id="bigNumber">—</div>
    <div id="unitLabel">DAYS LEFT</div>
    <div id="weeksLabel"></div>
    <div id="quarterLabel"></div>
  </div>

  <!-- Warning banner -->
  <div id="warningBanner">
    ⚠ <b>FY rollover approaching</b> — fewer than 70 days to the next financial year.
    Please sync from the website or update your quarter dates.
  </div>

  <!-- Editor (hidden by default) -->
  <div id="editor">
    <!-- 5 quarter rows (labels set by JS) -->
    <div class="q-row"><label id="lbl0">FY26 Q1</label><input type="date" id="d0" /></div>
    <div class="q-row"><label id="lbl1">FY26 Q2</label><input type="date" id="d1" /></div>
    <div class="q-row"><label id="lbl2">FY26 Q3</label><input type="date" id="d2" /></div>
    <div class="q-row"><label id="lbl3">FY26 Q4</label><input type="date" id="d3" /></div>
    <div class="q-row"><label id="lbl4">FY27 Q1</label><input type="date" id="d4" /></div>
    <div class="q-row" id="urlRow">
      <label for="urlInput">Sync URL</label>
      <input type="text" id="urlInput" placeholder="https://..." />
    </div>
    <div id="syncStatus"></div>
    <button id="saveBtn">Save Dates</button>
  </div>

  <!-- Footer -->
  <div id="footer">
    <div id="loginRow">
      <input type="checkbox" id="loginCheck" />
      <label for="loginCheck">Launch at Login</label>
    </div>
    <div id="versionInfo">
      <span id="versionLabel">v—</span> · by <a id="authorLink" href="#">Ian Hawkins</a>
    </div>
    <button id="quitBtn">Quit</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
